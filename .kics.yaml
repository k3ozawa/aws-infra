# KICS scan configuration
#
# Excluded queries:
#   The following S3 public access block queries are suppressed because
#   terraform-aws-modules/s3-bucket enables all public access block settings
#   by default (block_public_acls, block_public_policy, ignore_public_acls,
#   restrict_public_buckets = true). KICS cannot evaluate module defaults,
#   so these are false positives.
exclude-queries:
  - d0cc8694-fcad-43ff-ac86-32331d7e867f  # S3 Bucket Allows Public ACL (block_public_acls)
  - 4fa66806-0dd9-4f8d-9480-3174d39c7c91  # S3 Bucket Without Ignore Public ACL (ignore_public_acls)
  - 1ec253ab-c220-4d63-b2de-5b40e0af9293  # S3 Bucket Without Restriction Of Public Bucket (restrict_public_buckets)
  - bf878b1a-7418-4de3-b13c-3a86cf894920  # S3 Bucket Public ACL Overridden By Public Access Block (block_public_policy)
